<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>İletişim | Detaylı Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><div class="header-container"><h1>İletişim</h1>
        <nav><ul><li><a href="index.html">Ana Sayfa</a></li><li><a href="about.html">Hakkımda</a></li><li><a href="interests.html">İlgi Alanları</a></li><li><a href="contact.html">İletişim</a></li></ul></nav>
    </div></header>
    <main>
        <div class="contact-container">
            <h2>Detaylı İletişim Formu</h2>
            <form>
                <label>Ad Soyad:</label>
                <input type="text" placeholder="Örn: Asaf Karataş" required>
                
                <label>E-posta:</label>
                <input type="email" placeholder="ornek@mail.com" required>

                <div class="form-group-bg">
                    <p>İletişim Tercihi:</p>
                    <input type="radio" name="t" id="r1"> <label for="r1">E-posta</label><br>
                    <input type="radio" name="t" id="r2"> <label for="r2">Telefon</label>
                </div>

                <label>Konu:</label>
                <select>
                    <option>İş Teklifi</option>
                    <option>Soru</option>
                    <option>Geri Bildirim</option>
                </select>

                <label>Mesajınız:</label>
                <textarea rows="4" placeholder="Mesajınızı buraya yazın..."></textarea>

                <button type="submit" class="btn-gonder">Gönder</button>
                <button type="reset" class="btn-temizle">Temizle</button>
            </form>
        </div>
    </main>
    <footer>© 2026 Web Programlama Dersi</footer>
</body>
</html>
